apiVersion: v1
kind: Namespace
metadata:
  name: roadwatch-data

---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: roadwatch-data
type: Opaque
data:
  # Replace with base64-encoded values in real deployment
  POSTGRES_DB: cm9hZHdhdGNo
  POSTGRES_USER: cm9vdA==
  POSTGRES_PASSWORD: cG9zdGdyZXM=

---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: roadwatch-data
spec:
  ports:
    - port: 5432
      name: postgres
  selector:
    app: postgres
  type: ClusterIP

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: roadwatch-data
spec:
  serviceName: "postgres"
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgis/postgis:15-3.4
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: pgdata
      spec:
        accessModes: [ "ReadWriteOnce" ]
        resources:
          requests:
            storage: 10Gi

---
# Job to create PostGIS and pgvector extensions after DB is ready
apiVersion: batch/v1
kind: Job
metadata:
  name: init-postgres-extensions
  namespace: roadwatch-data
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: init-extensions
          image: postgres:15
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
          command:
            - /bin/sh
            - -c
            - |
              until pg_isready -h postgres -p 5432 -U $POSTGRES_USER; do echo waiting; sleep 2; done
              psql -h postgres -U $POSTGRES_USER -d $POSTGRES_DB -c "CREATE EXTENSION IF NOT EXISTS postgis; CREATE EXTENSION IF NOT EXISTS vector;"
