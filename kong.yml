_format_version: "3.0"
_transform: true

services:
  - name: auth-service
    url: http://host.docker.internal:3007
    routes:
      - name: auth-route
        paths:
          - /api/v1/auth

  - name: road-service
    url: http://host.docker.internal:3001
    routes:
      - name: road-route
        paths:
          - /api/v1/roads

  - name: budget-service
    url: http://host.docker.internal:3002
    routes:
      - name: budget-route
        paths:
          - /api/v1/budgets

  - name: complaint-service
    url: http://host.docker.internal:3003
    routes:
      - name: complaint-route
        paths:
          - /api/v1/complaints

  - name: document-service
    url: http://host.docker.internal:3004
    routes:
      - name: document-route
        paths:
          - /api/v1/documents

  - name: search-service
    url: http://host.docker.internal:3005
    routes:
      - name: search-route
        paths:
          - /api/v1/search

  - name: ai-gateway-service
    url: http://host.docker.internal:3006
    routes:
      - name: ai-gateway-route
        paths:
          - /api/v1/ai

plugins:
  - name: rate-limiting
    config:
      minute: 60
      policy: local
